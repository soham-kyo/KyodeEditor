<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KyodeEditor — Browser Code Editor</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <svg
          class="brand-icon"
          viewBox="0 0 28 28"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="28" height="28" rx="8" fill="url(#brandGrad)" />
          <path
            d="M8 10L12 14L8 18"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M14 18H20"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
          <defs>
            <linearGradient
              id="brandGrad"
              x1="0"
              y1="0"
              x2="28"
              y2="28"
              gradientUnits="userSpaceOnUse"
            >
              <stop stop-color="#a78bfa" />
              <stop offset="1" stop-color="#7c3aed" />
            </linearGradient>
          </defs>
        </svg>
        <span class="brand-name">KyodeEditor</span>
      </div>

      <div class="topbar-tabs">
        <button class="tab-btn active" data-tab="html">
          <span class="tab-dot html-dot"></span>HTML
        </button>
        <button class="tab-btn" data-tab="css">
          <span class="tab-dot css-dot"></span>CSS
        </button>
        <button class="tab-btn" data-tab="js">
          <span class="tab-dot js-dot"></span>JS
        </button>
      </div>

      <div class="topbar-actions">
        <label class="autorun-toggle" title="Auto-run on change">
          <input type="checkbox" id="autoRunToggle" checked />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-label">Auto</span>
        </label>

        <button
          class="btn btn-ghost"
          id="btnConsole"
          title="Toggle Console (Ctrl+`)"
        >
          <svg viewBox="0 0 20 20" fill="none">
            <rect
              x="2"
              y="4"
              width="16"
              height="12"
              rx="2"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M6 8l3 2-3 2M11 12h3"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Console
          <span class="console-badge" id="consoleBadge" hidden>0</span>
        </button>

        <button class="btn btn-ghost" id="btnDownload" title="Download as HTML">
          <svg viewBox="0 0 20 20" fill="none">
            <path
              d="M10 3v9m0 0l-3-3m3 3l3-3"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M4 14v1a2 2 0 002 2h8a2 2 0 002-2v-1"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          Export
        </button>

        <button
          class="btn btn-ghost icon-only"
          id="btnTheme"
          title="Toggle Theme"
        >
          <svg id="iconSun" viewBox="0 0 20 20" fill="none">
            <circle
              cx="10"
              cy="10"
              r="3.5"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <svg
            id="iconMoon"
            viewBox="0 0 20 20"
            fill="none"
            style="display: none"
          >
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <button
          class="btn btn-primary"
          id="btnRun"
          title="Run Code (Ctrl+Enter)"
        >
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M6 4.5l10 5.5-10 5.5V4.5z" fill="currentColor" />
          </svg>
          Run
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-pane" id="editorPane">
        <div class="editor-panel active" id="panel-html">
          <div class="editor-wrapper">
            <div class="line-numbers" id="ln-html"></div>
            <textarea
              class="code-editor"
              id="editor-html"
              spellcheck="false"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              placeholder="<!-- Write your HTML here -->"
            ></textarea>
          </div>
        </div>

        <div class="editor-panel" id="panel-css">
          <div class="editor-wrapper">
            <div class="line-numbers" id="ln-css"></div>
            <textarea
              class="code-editor"
              id="editor-css"
              spellcheck="false"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              placeholder="/* Write your CSS here */"
            ></textarea>
          </div>
        </div>

        <div class="editor-panel" id="panel-js">
          <div class="editor-wrapper">
            <div class="line-numbers" id="ln-js"></div>
            <textarea
              class="code-editor"
              id="editor-js"
              spellcheck="false"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              placeholder="// Write your JavaScript here"
            ></textarea>
          </div>
        </div>

        <div class="console-pane" id="consolePane">
          <div class="console-header">
            <span class="console-title">
              <svg viewBox="0 0 16 16" fill="none">
                <rect
                  x="1"
                  y="2"
                  width="14"
                  height="11"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="1.2"
                />
                <path
                  d="M4 6l3 2-3 2M9 10h3"
                  stroke="currentColor"
                  stroke-width="1.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              Console
            </span>
            <button
              class="btn-clear-console"
              id="btnClearConsole"
              title="Clear Console"
            >
              Clear
            </button>
          </div>
          <div class="console-output" id="consoleOutput">
            <div class="console-empty">
              No output yet. Run your code to see logs here.
            </div>
          </div>
        </div>
      </section>

      <div class="divider" id="divider">
        <div class="divider-handle">
          <span></span><span></span><span></span>
        </div>
      </div>

      <section class="preview-pane" id="previewPane">
        <div class="preview-header">
          <span class="preview-title">
            <svg viewBox="0 0 16 16" fill="none">
              <rect
                x="1"
                y="2"
                width="14"
                height="11"
                rx="2"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <circle cx="4" cy="5" r="0.8" fill="currentColor" />
              <circle cx="6.5" cy="5" r="0.8" fill="currentColor" />
            </svg>
            Preview
          </span>
          <button
            class="btn btn-ghost compact"
            id="btnRefresh"
            title="Refresh Preview"
          >
            <svg viewBox="0 0 16 16" fill="none">
              <path
                d="M13.5 8A5.5 5.5 0 013.08 11.5M2.5 8A5.5 5.5 0 0112.92 4.5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
              <path
                d="M11.5 4l1.5.5-.5 1.5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Refresh
          </button>
        </div>
        <iframe
          id="preview"
          sandbox="allow-scripts allow-modals allow-forms"
          title="Live Preview"
        ></iframe>
      </section>
    </main>

    <footer class="statusbar">
      <span class="status-item" id="statusSaved">
        <svg viewBox="0 0 12 12" fill="none">
          <path
            d="M2 6l3 3 5-5"
            stroke="#7c3aed"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Saved
      </span>
      <span class="status-divider">|</span>
      <span class="status-item" id="statusLines">Ln 1, Col 1</span>
      <span class="status-divider">|</span>
      <span class="status-item"> KyodeEditor v1.0</span>
      <span class="status-spacer"></span>
      <span class="status-item">
        <kbd>Ctrl+S</kbd> Save &nbsp; <kbd>Ctrl+Enter</kbd> Run &nbsp;
        <kbd>Tab</kbd> Indent
      </span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
